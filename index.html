<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Quản Lý & Lọc Học Viên Hà Vi</title>
    
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    
    <style>
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            -webkit-tap-highlight-color: transparent; 
        }
        body { 
            background-color: #050508; 
            color: #e0e0e6; 
            padding: 20px 8px; 
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }
        h2, h3 { 
            text-align: center; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            margin-bottom: 5px; 
        }
        h2 { 
            color: #00f0ff; 
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.5); 
            font-size: 1.4rem; 
            margin-bottom: 20px;
        }
        h3 { 
            color: #ff007f; 
            text-shadow: 0 0 10px rgba(255, 0, 127, 0.5); 
            font-size: 1.1rem; 
        }
        
        /* Bảng điều khiển upload tệp */
        .upload-panel {
            background: #0a0a14;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
        }
        .upload-desc {
            font-size: 0.85rem;
            color: #aaa;
            margin-bottom: 12px;
        }
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .btn-ctrl {
            padding: 10px 16px;
            font-weight: bold;
            font-size: 0.85rem;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
            border: none;
        }
        .label-upload { background: #00f0ff; color: #000; display: inline-block; }
        .btn-clear-cache { background: #4a0000; color: #ff3333; border: 1px solid #ff3333; }
        input[type="file"] { display: none; }
        #fileNameDisplay { margin-top: 10px; font-size: 0.8rem; color: #ffd700; font-style: italic; }

        /* Khung Tìm kiếm học viên */
        .search-panel {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }
        .search-input {
            flex: 1;
            background: #0d0d1a;
            border: 1px solid #333;
            color: #fff;
            padding: 12px;
            font-size: 0.9rem;
            border-radius: 4px;
            outline: none;
        }
        .search-input:focus { border-color: #ff007f; }
        .btn-search { background: #ff007f; color: #fff; padding: 0 15px; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; }

        /* Khung kết quả Tìm kiếm nhanh */
        .search-result-box {
            background: #0a0a14;
            border: 1px solid #ff007f;
            border-radius: 6px;
            padding: 15px 8px;
            margin-bottom: 20px;
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.2);
            display: none;
        }

        /* Khối hiển thị phân nhóm Sheet thành các danh sách lớp */
        .sheet-section {
            margin-top: 25px;
        }
        .sheet-title {
            color: #ffd700;
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 15px;
            border-left: 4px solid #ffd700;
            padding-left: 8px;
            text-transform: uppercase;
        }
        .class-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        /* Panel chính bao bọc từng lớp học */
        .class-panel { 
            background: #0a0a14; 
            border: 1px solid #00f0ff; 
            border-radius: 6px; 
            padding: 15px 8px; 
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.15); 
            margin-bottom: 20px;
        }
        .class-panel.highlighted {
            border: 2px solid #ffd700 !important;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }
        .class-stats { text-align: center; color: #ffd700; font-size: 0.9rem; margin-bottom: 15px; font-weight: bold; }

        /* Cấu trúc Danh sách học sinh & Thẻ học viên */
        .student-list { display: flex; flex-direction: column; gap: 10px; }
        .student-card { background: #121224; border: 1px solid #333; border-left: 4px solid #00f0ff; border-radius: 4px; padding: 12px 10px; display: flex; flex-direction: column; gap: 10px; }
        .student-info-row { display: flex; justify-content: space-between; align-items: center; gap: 8px; border-bottom: 1px solid #222; padding-bottom: 6px; }
        .student-meta { display: flex; flex-direction: column; gap: 2px; flex: 1; }
        .student-name { font-weight: bold; font-size: 0.95rem; color: #fff; }
        .student-phone { font-size: 0.8rem; color: #888; font-family: monospace; }
        .student-actions-right { display: flex; gap: 5px; }
        .btn-call { background: #ffd700; color: #000; padding: 8px 12px; font-size: 0.9rem; border: none; border-radius: 4px; cursor: pointer; box-shadow: 0 0 5px #ffd700; }
        .btn-delete { background: #4a0000; color: #ff3333; border: 1px solid #ff3333; padding: 8px 10px; font-size: 0.9rem; border-radius: 4px; cursor: pointer; }
        
        /* Hàng chứa các Select ghi chú */
        .student-controls-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
        @media (min-width: 350px) { .student-controls-row { grid-template-columns: repeat(4, 1fr); } }
        .note-select { background: #1a1a3a; color: #00f0ff; border: 1px solid #00f0ff; padding: 8px 2px; font-size: 0.75rem; border-radius: 3px; outline: none; width: 100%; text-align: center; }
        .note-select.status-sel { color: #ffd700; border-color: #ffd700; }

        /* Tiến trình & Trạng thái */
        .progress-container { width: 100%; background-color: #111; border-radius: 10px; margin: 15px 0; display: none; overflow: hidden; border: 1px solid #333; }
        .progress-bar { width: 0%; height: 20px; background-color: #00f0ff; text-align: center; line-height: 20px; color: #000; font-weight: bold; font-size: 11px; transition: width 0.1s ease; }
        .status-msg { text-align: center; font-size: 0.9rem; color: #ffd700; margin-bottom: 15px; line-height: 1.4; }
        
        /* Nút copy phân lớp */
        .btn-copy-class { background: #1a1a1a; color: #fff; border: 1px solid #444; padding: 10px; width: 100%; border-radius: 4px; font-size: 0.8rem; font-weight: bold; cursor: pointer; margin-top: 12px; transition: all 0.2s; }
        .btn-copy-class:hover { border-color: #00f0ff; color: #00f0ff; }
        .btn-copy-class.copied { background: rgba(0, 240, 255, 0.2) !important; color: #00f0ff !important; border-color: #00f0ff !important; }
    </style>
</head>
<body>

<div class="container">
    <h2>Hệ Thống Bộ Lọc Học Viên Hà Vi</h2>

    <div class="upload-panel">
        <div class="upload-desc">Tự động nhận diện Khối lớp (Sheet) và phân nhóm theo Tên lớp cụ thể bên trong bảng Excel</div>
        <div class="btn-group">
            <label for="excelFile" class="btn-ctrl label-upload">📂 Chọn tệp dữ liệu Excel</label>
            <input type="file" id="excelFile" accept=".xlsx, .xls" onchange="startProcessing(this)">
            <button class="btn-ctrl btn-clear-cache" onclick="clearLocalStorage()">🗑️ Xóa bộ nhớ cache</button>
        </div>
        <div id="fileNameDisplay">Chưa chọn tệp cấu trúc dữ liệu</div>
    </div>

    <div class="search-panel">
        <input type="text" id="searchInput" class="search-input" placeholder="Nhập tên học sinh hoặc SĐT cần tìm..." onkeypress="handleSearchKeyPress(event)">
        <button class="btn-search" onclick="searchStudent()">🔍 Tìm</button>
    </div>

    <div id="searchResultBox" class="search-result-box">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding: 0 4px;">
            <h3 id="resultCount" style="color: #ff007f;">Tìm thấy 0 học viên</h3>
            <button style="background: #222; color:#fff; border:1px solid #555; padding:3px 8px; font-size:11px; border-radius:3px;" onclick="document.getElementById('searchResultBox').style.display='none'">Đóng X</button>
        </div>
        <div class="student-list" id="resultBody"></div>
    </div>

    <div class="progress-container" id="progressContainer">
        <div class="progress-bar" id="progressBar">0%</div>
    </div>
    <div id="statusMessage" class="status-msg">Chưa có dữ liệu học viên. Vui lòng chọn tệp Excel.</div>

    <div id="outputContainer"></div>
</div>

<script>
const targetSheets = ["SV", "12", "11", "10", "9", "8", "7", "6", "5", "4", "3", "2", "DH25", "DH26"];
let finalStoredData = []; 

window.onload = function() {
    const cachedData = localStorage.getItem('excel_processed_data_v4');
    const cachedFileName = localStorage.getItem('excel_file_name_v4');
    const cachedCount = localStorage.getItem('excel_student_count_v4');

    if (cachedData) {
        finalStoredData = JSON.parse(cachedData);
        document.getElementById('fileNameDisplay').innerText = `Lịch sử tệp đã lưu: ${cachedFileName || "Ẩn danh"}`;
        document.getElementById('statusMessage').style.color = "#00ff66";
        document.getElementById('statusMessage').innerHTML = `✓ Phục hồi thành công danh sách từ trình duyệt.<br>Tổng cộng: <strong>${cachedCount || 0}</strong> học viên.`;
        renderBlocksFromData(finalStoredData);
    }
};

function displayPhone(p) { 
    if(!p || p === 'Chưa có') return 'Chưa có'; 
    let c = p.replace(/\s+/g, ''); 
    if(c.length === 10) return c.substring(0,4)+' '+c.substring(4,7)+' '+c.substring(7); 
    return p; 
}

function startProcessing(input) {
    const file = input.files[0];
    if (!file) return;

    document.getElementById('fileNameDisplay').innerText = `Đang đọc: ${file.name}`;
    document.getElementById('outputContainer').innerHTML = "";
    document.getElementById('searchResultBox').style.display = 'none';
    document.getElementById('statusMessage').innerText = "Đang bóc tách dữ liệu ma trận...";
    
    const progressContainer = document.getElementById('progressContainer');
    const progressBar = document.getElementById('progressBar');
    progressContainer.style.display = 'block';
    progressBar.style.width = '0%';
    progressBar.innerText = '0%';

    finalStoredData = []; 

    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array', raw: false });
            const validSheetsInFile = workbook.SheetNames.filter(name => targetSheets.includes(name.trim()));
            
            if (validSheetsInFile.length === 0) {
                document.getElementById('statusMessage').style.color = "#ff3333";
                document.getElementById('statusMessage').innerText = "Không tìm thấy sheet cấu trúc phù hợp trong file Excel.";
                progressContainer.style.display = 'none';
                return;
            }

            processTargetSheets(workbook, validSheetsInFile, file.name);
        } catch (error) {
            console.error(error);
            document.getElementById('statusMessage').style.color = "#ff3333";
            document.getElementById('statusMessage').innerText = "Xảy ra lỗi khi đọc giải mã tệp Excel.";
            progressContainer.style.display = 'none';
        }
    };
    reader.readAsArrayBuffer(file);
}

function processTargetSheets(workbook, sheetsToProcess, fileName) {
    const totalSheets = sheetsToProcess.length;
    let currentIdx = 0;
    let totalStudentsCount = 0;
    let globalStudentUid = 1;

    const progressBar = document.getElementById('progressBar');
    const statusMsg = document.getElementById('statusMessage');

    function parseNext() {
        if (currentIdx >= totalSheets) {
            progressBar.style.width = '100%';
            progressBar.innerText = '100% Hoàn thành';
            statusMsg.style.color = "#00ff66";
            statusMsg.innerHTML = `✓ Hoàn tất! Dữ liệu đã chia rành mạch theo các cấu trúc ô lớp nhỏ.<br>Tổng cộng thu được <strong>${totalStudentsCount}</strong> học viên.`;
            
            try {
                localStorage.setItem('excel_processed_data_v4', JSON.stringify(finalStoredData));
                localStorage.setItem('excel_file_name_v4', fileName);
                localStorage.setItem('excel_student_count_v4', totalStudentsCount);
            } catch(e) {
                console.log("Local Storage đầy dữ liệu!", e);
            }

            renderBlocksFromData(finalStoredData);
            return;
        }

        const sheetName = sheetsToProcess[currentIdx];
        let percent = Math.round((currentIdx / totalSheets) * 100);
        progressBar.style.width = percent + '%';
        progressBar.innerText = percent + '%';

        const sheet = workbook.Sheets[sheetName];
        const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, raw: false });

        if (rows.length > 0) {
            const colAIndex = 0;  
            const colBIndex = 1;  
            const colPIndex = 16; 

            let currentClassName = "";
            let currentUpperHeader = "";
            let currentClassStudents = [];
            let actualClassTitleForSearch = ""; 

            let currentSheetBlock = {
                sheetName: sheetName,
                cards: []
            };

            rows.forEach((row, rowIndex) => {
                if (!row) return;

                let cellA = row[colAIndex] ? row[colAIndex].toString().trim() : "";
                let cellB = row[colBIndex] ? row[colBIndex].toString().trim() : "";
                let cellP = row[colPIndex] ? row[colPIndex].toString().trim() : "";

                let cellB_lower = cellB.toLowerCase();
                let cleanPhoneCheck = cellP.replace(/[^0-9]/g, "");

                if (cellB && cleanPhoneCheck.length < 9 && 
                    (cellB.includes("-") || cellB.includes("/") || cellA.match(/^(I|II|III|IV|V|VI|VII|VIII|IX|X)\b/) || cellB_lower.includes("kid") || cellB_lower.includes("smile") || cellB_lower.includes("happy") || cellB_lower.includes("athena") || cellB_lower.includes("win"))) {
                    
                    if (currentClassStudents.length > 0) {
                        totalStudentsCount += currentClassStudents.length;
                        currentSheetBlock.cards.push({
                            upperTitle: currentUpperHeader,
                            className: currentClassName,
                            studentsList: currentClassStudents,
                            realTitle: actualClassTitleForSearch || currentClassName
                        });
                        currentClassStudents = [];
                    }
                    
                    let upperInfo = "";
                    actualClassTitleForSearch = ""; 

                    if (rowIndex > 0) {
                        let prevRow = rows[rowIndex - 1];
                        if (prevRow) {
                            let pB = prevRow[colBIndex] ? prevRow[colBIndex].toString().trim() : "";
                            let pA = prevRow[colAIndex] ? prevRow[colAIndex].toString().trim() : "";
                            if (pB && !pB.toLowerCase().includes("tên học sinh") && !pB.toLowerCase().includes("họ và tên")) {
                                upperInfo = pB;
                                actualClassTitleForSearch = pB; 
                            } else if (pA) {
                                upperInfo = pA;
                                actualClassTitleForSearch = pA;
                            }
                        }
                    }

                    currentClassName = cellB;
                    currentUpperHeader = upperInfo;
                    return;
                }

                if (cellB === "" || cellB_lower === "tên học sinh" || cellB_lower === "tên hs" || cellB_lower === "họ và tên") {
                    return;
                }

                let cleanPhone = cellP.replace(/[^0-9]/g, "");
                if (cleanPhone.length === 9 && !cleanPhone.startsWith("0")) cleanPhone = "0" + cleanPhone;

                if (cellB && !/^\d+$/.test(cellB) && (cleanPhone.length >= 9 || cellP.toLowerCase() === "chưa có" || cellP === "")) {
                    if (!currentClassName) {
                        currentClassName = `Chung - Khối ${sheetName}`;
                        actualClassTitleForSearch = `Chung - Khối ${sheetName}`;
                    }
                    currentClassStudents.push({
                        uid: globalStudentUid++,
                        name: cellB,
                        phone: cleanPhone || "Chưa có",
                        grammar: '', communication: '', attitude: '', progress: ''
                    });
                }
            });

            if (currentClassStudents.length > 0) {
                totalStudentsCount += currentClassStudents.length;
                currentSheetBlock.cards.push({
                    upperTitle: currentUpperHeader,
                    className: currentClassName,
                    studentsList: currentClassStudents,
                    realTitle: actualClassTitleForSearch || currentClassName
                });
            }

            if (currentSheetBlock.cards.length > 0) {
                finalStoredData.push(currentSheetBlock);
            }
        }

        currentIdx++;
        setTimeout(parseNext, 15);
    }

    parseNext();
}

function renderBlocksFromData(dataBlocks) {
    const mainOutputContainer = document.getElementById('outputContainer');
    mainOutputContainer.innerHTML = ""; 

    dataBlocks.forEach((block, bIdx) => {
        let sheetBlock = document.createElement('div');
        sheetBlock.className = 'sheet-section';
        sheetBlock.innerHTML = `<div class="sheet-title">KHỐI LỚP (SHEET): ${block.sheetName}</div>`;
        
        let cardsGrid = document.createElement('div');
        cardsGrid.className = 'class-grid';
        sheetBlock.appendChild(cardsGrid);

        block.cards.forEach((cardData, cIdx) => {
            let classCardId = `panel-box-${bIdx}-${cIdx}`;
            
            let card = document.createElement('div');
            card.className = 'class-panel';
            card.id = classCardId;
            card.setAttribute('data-classname', cardData.realTitle);

            let headerText = cardData.upperTitle ? `<h3>${cardData.upperTitle}</h3>` : "";
            headerText += `<h3>Danh Sách: ${cardData.className}</h3>`;
            
            let statsText = `<div class="class-stats">Sĩ số: ${cardData.studentsList.length}</div>`;

            let listContainer = document.createElement('div');
            listContainer.className = 'student-list';

            let textForCopy = []; 

            cardData.studentsList.forEach((student, sIdx) => {
                textForCopy.push(`${sIdx + 1}. ${student.name}\tSĐT: ${displayPhone(student.phone)}`);
                
                let studentCard = document.createElement('div');
                studentCard.className = 'student-card';
                studentCard.id = `std-card-dom-${student.uid}`;
                
                studentCard.innerHTML = `
                    <div class="student-info-row">
                        <div class="student-meta">
                            <span class="student-name">${sIdx + 1}. ${student.name}</span>
                            <span class="student-phone">SĐT: ${displayPhone(student.phone)}</span>
                        </div>
                        <div class="student-actions-right">
                            <button class="btn-call" onclick="callStudent('${student.phone}')">📞</button>
                            <button class="btn-delete" onclick="deleteStudentInline(${student.uid}, '${student.name}', '${classCardId}')">🗑️</button>
                        </div>
                    </div>
                    <div class="student-controls-row">
                        <select class="note-select" onchange="updateStudentField(${student.uid}, 'grammar', this.value)">
                            <option value="">-- Ngữ pháp --</option>
                            <option value="Tốt" ${student.grammar==='Tốt'?'selected':''}>Ngữ pháp: Tốt</option>
                            <option value="Khá" ${student.grammar==='Khá'?'selected':''}>Ngữ pháp: Khá</option>
                            <option value="Trung bình" ${student.grammar==='Trung bình'?'selected':''}>Ngữ pháp: TB</option>
                            <option value="Yếu" ${student.grammar==='Yếu'?'selected':''}>Ngữ pháp: Yếu</option>
                        </select>
                        <select class="note-select" onchange="updateStudentField(${student.uid}, 'communication', this.value)">
                            <option value="">-- Giao tiếp --</option>
                            <option value="Tốt" ${student.communication==='Tốt'?'selected':''}>Giao tiếp: Tốt</option>
                            <option value="Khá" ${student.communication==='Khá'?'selected':''}>Giao tiếp: Khá</option>
                            <option value="Trung bình" ${student.communication==='Trung bình'?'selected':''}>Giao tiếp: TB</option>
                            <option value="Yếu" ${student.communication==='Yếu'?'selected':''}>Giao tiếp: Yếu</option>
                        </select>
                        <select class="note-select" onchange="updateStudentField(${student.uid}, 'attitude', this.value)">
                            <option value="">-- Ý thức --</option>
                            <option value="Tốt" ${student.attitude==='Tốt'?'selected':''}>Ý thức: Tốt</option>
                            <option value="Khá" ${student.attitude==='Khá'?'selected':''}>Ý thức: Khá</option>
                            <option value="Trung bình" ${student.attitude==='Trung bình'?'selected':''}>Ý thức: TB</option>
                            <option value="Chưa tốt" ${student.attitude==='Chưa tốt'?'selected':''}>Ý thức: Chưa tốt</option>
                        </select>
                        <select class="note-select status-sel" onchange="updateStudentField(${student.uid}, 'progress', this.value)">
                            <option value="">-- Tình trạng --</option>
                            <option value="Tiến bộ" ${student.progress==='Tiến bộ'?'selected':''}>📈 Tiến bộ</option>
                            <option value="Duy trì" ${student.progress==='Duy trì'?'selected':''}>➡️ Duy trì</option>
                            <option value="Cần cố gắng" ${student.progress==='Cần cố gắng'?'selected':''}>⚠️ Cố gắng</option>
                            <option value="Kém đi" ${student.progress==='Kém đi'?'selected':''}>📉 Kém đi</option>
                        </select>
                    </div>
                `;
                listContainer.appendChild(studentCard);
            });

            let btnCopy = document.createElement('button');
            btnCopy.className = 'btn-copy-class';
            btnCopy.innerText = '📋 Copy Tên + SĐT Toàn Lớp';
            btnCopy.onclick = function() {
                navigator.clipboard.writeText(textForCopy.join('\n')).then(() => {
                    btnCopy.innerText = '✓ Đã Copy Lớp Thành Công!';
                    btnCopy.classList.add('copied');
                    setTimeout(() => {
                        btnCopy.innerText = '📋 Copy Tên + SĐT Toàn Lớp';
                        btnCopy.classList.remove('copied');
                    }, 1500);
                });
            };

            card.innerHTML = headerText + statsText;
            card.appendChild(listContainer);
            card.appendChild(btnCopy);
            cardsGrid.appendChild(card);
        });

        mainOutputContainer.appendChild(sheetBlock);
    });
}

function updateStudentField(uid, field, value) {
    let found = false;
    for (let block of finalStoredData) {
        for (let card of block.cards) {
            let student = card.studentsList.find(s => s.uid === uid);
            if (student) {
                student[field] = value;
                found = true;
                break;
            }
        }
        if (found) break;
    }
    localStorage.setItem('excel_processed_data_v4', JSON.stringify(finalStoredData));
}

function deleteStudentInline(uid, name, cardId) {
    if (confirm(`Bạn có chắc muốn XÓA học sinh ${name}?`)) {
        let found = false;
        for (let block of finalStoredData) {
            for (let card of block.cards) {
                let initialLength = card.studentsList.length;
                card.studentsList = card.studentsList.filter(s => s.uid !== uid);
                if (card.studentsList.length !== initialLength) {
                    found = true;
                    // Cập nhật lại sỹ số trên giao diện panel
                    const panelDom = document.getElementById(cardId);
                    if (panelDom) {
                        const statsDom = panelDom.querySelector('.class-stats');
                        if (statsDom) statsDom.innerText = `Sĩ số: ${card.studentsList.length}`;
                    }
                    break;
                }
            }
            if (found) break;
        }
        
        // Xóa phần tử trên DOM trực tiếp
        const cardDom = document.getElementById(`std-card-dom-${uid}`);
        if (cardDom) cardDom.remove();
        
        // Đồng bộ lại vào LocalStorage
        localStorage.setItem('excel_processed_data_v4', JSON.stringify(finalStoredData));
        
        // Cập nhật tổng số lượng học viên hệ thống công khai
        let currentTotal = parseInt(localStorage.getItem('excel_student_count_v4') || 0);
        if (currentTotal > 0) {
            currentTotal--;
            localStorage.setItem('excel_student_count_v4', currentTotal);
            document.getElementById('statusMessage').innerHTML = `✓ Cập nhật trạng thái sau khi xóa.<br>Tổng cộng còn lại: <strong>${currentTotal}</strong> học viên.`;
        }
    }
}

function callStudent(phone) { 
    if(!phone || phone === 'Chưa có') { 
        alert('Học viên chưa cập nhật số điện thoại!'); 
        return; 
    } 
    window.location.href = 'tel:' + phone.replace(/\s+/g, ''); 
}

function searchStudent() {
    const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
    const resultBox = document.getElementById('searchResultBox');
    const resultBody = document.getElementById('resultBody');
    const resultCount = document.getElementById('resultCount');
    
    resultBody.innerHTML = "";
    resultBox.style.display = 'none';
    
    const allClassPanels = document.querySelectorAll('.class-panel');
    allClassPanels.forEach(p => p.classList.remove('highlighted'));

    if (keyword === "") return;

    let absoluteKeyword = keyword.replace(/\s/g, ""); 
    let firstMatchCardDom = null;
    let matchCount = 0;

    finalStoredData.forEach((block, bIdx) => {
        block.cards.forEach((card, cIdx) => {
            let isCardMatched = false;
            
            card.studentsList.forEach((student, sIdx) => {
                const textToSearch = (student.name + " " + student.phone).toLowerCase();
                const textNoSpace = textToSearch.replace(/\s/g, "");

                if (textToSearch.includes(keyword) || textNoSpace.includes(absoluteKeyword)) {
                    matchCount++;
                    isCardMatched = true;

                    let resCard = document.createElement('div');
                    resCard.className = 'student-card';
                    resCard.innerHTML = `
                        <div class="student-info-row">
                            <div class="student-meta">
                                <span class="student-name">${student.name} <span style="color:#00f0ff; font-size:0.75rem;">[Lớp: ${card.className}]</span></span>
                                <span class="student-phone">SĐT: ${displayPhone(student.phone)}</span>
                            </div>
                            <div class="student-actions-right">
                                <button class="btn-call" onclick="callStudent('${student.phone}')">📞</button>
                            </div>
                        </div>
                    `;
                    resultBody.appendChild(resCard);
                }
            });

            if (isCardMatched) {
                let targetCardDom = document.getElementById(`panel-box-${bIdx}-${cIdx}`);
                if (targetCardDom) {
                    targetCardDom.classList.add('highlighted');
                    if (!firstMatchCardDom) firstMatchCardDom = targetCardDom;
                }
            }
        });
    });

    if (matchCount > 0) {
        resultCount.innerText = `Tìm thấy ${matchCount} học viên trùng khớp:`;
        resultBox.style.display = 'block';
        
        if (firstMatchCardDom) {
            setTimeout(() => {
                firstMatchCardDom.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 120);
        }
    } else {
        alert("Không tìm thấy dữ liệu học sinh nào trùng khớp với thông tin cần tìm.");
    }
}

function handleSearchKeyPress(event) {
    if (event.key === 'Enter') searchStudent();
}

function clearLocalStorage() {
    if (confirm("Bạn có chắc chắn muốn xóa dữ liệu lịch sử cache khỏi trình duyệt không?")) {
        localStorage.removeItem('excel_processed_data_v4');
        localStorage.removeItem('excel_file_name_v4');
        localStorage.removeItem('excel_student_count_v4');
        
        document.getElementById('fileNameDisplay').innerText = "Chưa chọn tệp nào";
        document.getElementById('statusMessage').style.color = "#ffd700";
        document.getElementById('statusMessage').innerText = "Chưa có dữ liệu học viên. Vui lòng chọn tệp Excel.";
        document.getElementById('outputContainer').innerHTML = "";
        document.getElementById('searchResultBox').style.display = 'none';
        document.getElementById('excelFile').value = "";
        document.getElementById('progressContainer').style.display = 'none';
        
        alert("Đã giải phóng bộ nhớ!");
    }
}
</script>
