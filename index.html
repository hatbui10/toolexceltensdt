<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bộ Lọc Học Viên - Chia Ô & Copy Theo Lớp</title>
    
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    
    <style>
        :root {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-color: #2ecc71;
            --border-color: #333333;
            --input-bg: #2a2a2a;
            --card-bg: #252525;
            --btn-hover: #27ae60;
            --search-highlight: #ffb142;
            --danger-color: #ff4757;
            --danger-hover: #ff6b81;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            background: var(--container-bg);
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        h2 {
            text-align: center;
            color: var(--accent-color);
            margin-top: 0;
            text-transform: uppercase;
            font-size: 22px;
            letter-spacing: 0.5px;
        }

        .upload-section {
            background: #252525;
            border: 2px dashed var(--border-color);
            padding: 25px;
            text-align: center;
            border-radius: 6px;
            margin-bottom: 25px;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 10px;
        }

        .clear-btn {
            background-color: var(--danger-color);
            color: #fff;
            padding: 12px 25px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            border: none;
            display: inline-block;
            transition: background 0.2s;
        }

        .clear-btn:hover {
            background-color: var(--danger-hover);
        }

        .search-section {
            background: #252525;
            border: 1px solid var(--border-color);
            padding: 15px 20px;
            border-radius: 6px;
            margin-bottom: 15px;
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .search-input {
            flex: 1;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            padding: 12px 15px;
            color: #fff;
            border-radius: 4px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input:focus {
            border-color: var(--search-highlight);
        }

        .search-btn {
            background: var(--search-highlight);
            color: #000;
            border: none;
            padding: 12px 25px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            font-size: 15px;
            transition: opacity 0.2s;
        }

        .search-btn:hover {
            opacity: 0.9;
        }

        .search-result-box {
            background: #1a252f;
            border: 1px solid #34495e;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 25px;
            display: none;
        }

        .result-title {
            color: var(--search-highlight);
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 15px;
            display: flex;
            justify-content: space-between;
        }

        .result-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 5px;
        }

        .result-table th, .result-table td {
            border: 1px solid #2c3e50;
            padding: 10px;
            text-align: left;
            font-size: 14px;
        }

        .result-table th {
            background-color: #2c3e50;
            color: #fff;
        }

        .result-table tr:nth-child(even) {
            background-color: #22313f;
        }

        .call-btn {
            background-color: var(--accent-color);
            color: #121212;
            border: none;
            padding: 4px 10px;
            border-radius: 4px;
            text-decoration: none;
            font-weight: bold;
            font-size: 12px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            transition: background 0.2s;
        }

        .call-btn:hover {
            background-color: var(--btn-hover);
        }

        .file-input-label {
            background-color: var(--accent-color);
            color: #121212;
            padding: 12px 25px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            display: inline-block;
            transition: background 0.2s;
        }

        .file-input-label:hover {
            background-color: var(--btn-hover);
        }

        input[type="file"] {
            display: none;
        }

        .progress-container {
            width: 100%;
            background-color: #2a2a2a;
            border-radius: 20px;
            margin: 20px 0;
            display: none;
            overflow: hidden;
        }

        .progress-bar {
            width: 0%;
            height: 24px;
            background-color: var(--accent-color);
            text-align: center;
            line-height: 24px;
            color: #000;
            font-weight: bold;
            font-size: 13px;
            transition: width 0.1s ease;
        }

        .status {
            margin-top: 10px;
            font-size: 15px;
            text-align: center;
            line-height: 1.5;
        }

        .sheet-section {
            margin-top: 30px;
            border-top: 2px solid var(--border-color);
            padding-top: 15px;
        }

        .sheet-title {
            color: #ffb142;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            border-left: 4px solid #ffb142;
            padding-left: 10px;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .class-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }

        .class-card.highlighted {
            border: 2px solid var(--search-highlight) !important;
            box-shadow: 0 0 15px rgba(255, 177, 66, 0.4);
            transform: scale(1.02);
        }

        .class-header {
            margin-bottom: 10px;
        }

        .upper-title {
            font-size: 12px;
            color: #aaa;
            font-style: italic;
            margin-bottom: 4px;
            display: block;
        }

        .class-name {
            font-size: 15px;
            color: var(--accent-color);
            font-weight: bold;
            border-bottom: 1px solid #3a3a3a;
            padding-bottom: 6px;
            margin-bottom: 10px;
        }

        /* KHU VỰC DANH SÁCH HỌC VIÊN MỚI THAY CHO TEXTAREA */
        .students-list-box {
            width: 100%;
            height: 180px;
            background: var(--input-bg);
            border: 1px solid #333;
            border-radius: 4px;
            padding: 5px;
            box-sizing: border-box;
            overflow-y: auto;
            margin-bottom: 10px;
        }

        .student-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 8px;
            border-bottom: 1px solid #222;
            font-size: 13px;
        }

        .student-row:last-child {
            border-bottom: none;
        }

        .student-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex: 1;
        }

        .std-name {
            font-weight: bold;
            color: #ffffff;
        }

        .std-phone {
            color: #aaa;
            font-family: monospace;
            font-size: 12px;
        }

        .copy-btn {
            background-color: #34495e;
            color: #fff;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            width: 100%;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            background-color: #2c3e50;
        }

        .copy-btn.copied {
            background-color: var(--accent-color) !important;
            color: #000 !important;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>BỘ LỌC HỌC VIÊN CHIA Ô VÀ COPY THEO LỚP</h2>
    
    <div class="upload-section">
        <p style="margin: 0 0 10px 0;">Trích xuất cột B và P từ sheet SV đến DH26 (Mỗi lớp có nút Gọi điện riêng cho từng học sinh)</p>
        <div class="btn-group">
            <label for="excelFile" class="file-input-label">Chọn tệp danh sách Excel</label>
            <input type="file" id="excelFile" accept=".xlsx, .xls" onchange="startProcessing(this)">
            <button class="clear-btn" onclick="clearLocalStorage()">Xóa dữ liệu cũ</button>
        </div>
        <div id="fileNameDisplay" style="margin-top: 12px; color: #aaa; font-style: italic;">Chưa chọn tệp nào</div>
    </div>

    <div class="search-section">
        <input type="text" id="searchInput" class="search-input" placeholder="Nhập tên hoặc số điện thoại để tìm kiếm..." onkeypress="handleSearchKeyPress(event)">
        <button class="search-btn" onclick="searchStudent()">Tìm kiếm</button>
    </div>

    <div id="searchResultBox" class="search-result-box">
        <div class="result-title">
            <span>🔍 KẾT QUẢ TÌM KIẾM NHANH:</span>
            <span id="resultCount" style="color: #fff;"></span>
        </div>
        <table class="result-table">
            <thead>
                <tr>
                    <th>Họ và Tên</th>
                    <th>Số điện thoại</th>
                    <th>Thuộc Lớp</th>
                    <th>Hành động</th>
                </tr>
            </thead>
            <tbody id="resultBody">
            </tbody>
        </table>
    </div>

    <div class="progress-container" id="progressContainer">
        <div class="progress-bar" id="progressBar">0%</div>
    </div>

    <div id="statusMessage" class="status"></div>

    <div id="outputContainer"></div>
</div>

<script>
const targetSheets = ["SV", "12", "11", "10", "9", "8", "7", "6", "5", "4", "3", "2", "DH25", "DH26"];
let finalStoredData = []; 

window.onload = function() {
    const cachedData = localStorage.getItem('excel_processed_data');
    const cachedFileName = localStorage.getItem('excel_file_name');
    const cachedCount = localStorage.getItem('excel_student_count');

    if (cachedData) {
        finalStoredData = JSON.parse(cachedData);
        document.getElementById('fileNameDisplay').innerText = `Dữ liệu lịch sử: ${cachedFileName || "Ẩn danh"}`;
        document.getElementById('statusMessage').style.color = "var(--accent-color)";
        document.getElementById('statusMessage').innerHTML = `✓ Đã khôi phục dữ liệu từ bộ nhớ trình duyệt.<br>Tổng cộng: <strong>${cachedCount || 0}</strong> học viên.`;
        renderBlocksFromData(finalStoredData);
    }
};

function startProcessing(input) {
    const file = input.files[0];
    if (!file) return;

    document.getElementById('fileNameDisplay').innerText = `Tệp đang lọc: ${file.name}`;
    document.getElementById('outputContainer').innerHTML = "";
    document.getElementById('searchResultBox').style.display = 'none';
    document.getElementById('statusMessage').innerHTML = "Đang khởi tạo cấu trúc chia ô...";
    
    const progressContainer = document.getElementById('progressContainer');
    const progressBar = document.getElementById('progressBar');
    progressContainer.style.display = 'block';
    progressBar.style.width = '0%';
    progressBar.innerText = '0%';

    finalStoredData = []; 

    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array', cellStyles: true });
            const validSheetsInFile = workbook.SheetNames.filter(name => targetSheets.includes(name.trim()));
            
            if (validSheetsInFile.length === 0) {
                document.getElementById('statusMessage').style.color = "#ff4757";
                document.getElementById('statusMessage').innerText = "Không tìm thấy sheet phù hợp.";
                progressContainer.style.display = 'none';
                return;
            }

            processTargetSheets(workbook, validSheetsInFile, file.name);
        } catch (error) {
            console.error(error);
            document.getElementById('statusMessage').style.color = "#ff4757";
            document.getElementById('statusMessage').innerText = "Lỗi khi đọc file Excel.";
            progressContainer.style.display = 'none';
        }
    };
    reader.readAsArrayBuffer(file);
}

function processTargetSheets(workbook, sheetsToProcess, fileName) {
    const totalSheets = sheetsToProcess.length;
    let currentIdx = 0;
    let totalStudentsCount = 0;

    const progressBar = document.getElementById('progressBar');
    const statusMsg = document.getElementById('statusMessage');

    function parseNext() {
        if (currentIdx >= totalSheets) {
            progressBar.style.width = '100%';
            progressBar.innerText = '100% Hoàn thành';
            statusMsg.style.color = "var(--accent-color)";
            statusMsg.innerHTML = `✓ Phân tách ô hoàn tất! Đã chia dữ liệu rành mạch theo từng lớp.<br>Tổng cộng thu được <strong>${totalStudentsCount}</strong> học viên.`;
            
            try {
                localStorage.setItem('excel_processed_data', JSON.stringify(finalStoredData));
                localStorage.setItem('excel_file_name', fileName);
                localStorage.setItem('excel_student_count', totalStudentsCount);
            } catch(e) {
                console.log("Local Storage đầy hoặc không được hỗ trợ", e);
            }

            renderBlocksFromData(finalStoredData);
            return;
        }

        const sheetName = sheetsToProcess[currentIdx];
        let percent = Math.round((currentIdx / totalSheets) * 100);
        progressBar.style.width = percent + '%';
        progressBar.innerText = percent + '%';

        const sheet = workbook.Sheets[sheetName];
        const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, raw: false });

        if (rows.length > 0) {
            const colAIndex = 0;  
            const colBIndex = 1;  
            const colPIndex = 16; 

            let currentClassName = "";
            let currentUpperHeader = "";
            let currentClassStudents = [];
            let actualClassTitleForSearch = ""; 

            let currentSheetBlock = {
                sheetName: sheetName,
                cards: []
            };

            rows.forEach((row, rowIndex) => {
                if (!row) return;

                let cellA = row[colAIndex] ? row[colAIndex].toString().trim() : "";
                let cellB = row[colBIndex] ? row[colBIndex].toString().trim() : "";
                let cellP = row[colPIndex] ? row[colPIndex].toString().trim() : "";

                let cellB_lower = cellB.toLowerCase();
                let cleanPhoneCheck = cellP.replace(/[^0-9]/g, "");

                if (cellB && cleanPhoneCheck.length < 9 && 
                    (cellB.includes("-") || cellB.includes("/") || cellA.match(/^(I|II|III|IV|V|VI|VII|VIII|IX|X)\b/) || cellB_lower.includes("kid") || cellB_lower.includes("smile") || cellB_lower.includes("happy") || cellB_lower.includes("athena") || cellB_lower.includes("win"))) {
                    
                    if (currentClassStudents.length > 0) {
                        totalStudentsCount += currentClassStudents.length;
                        currentSheetBlock.cards.push({
                            upperTitle: currentUpperHeader,
                            className: currentClassName,
                            studentsList: currentClassStudents,
                            realTitle: actualClassTitleForSearch || currentClassName
                        });
                        currentClassStudents = [];
                    }
                    
                    let upperInfo = "";
                    actualClassTitleForSearch = ""; 

                    if (rowIndex > 0) {
                        let prevRow = rows[rowIndex - 1];
                        if (prevRow) {
                            let pB = prevRow[colBIndex] ? prevRow[colBIndex].toString().trim() : "";
                            let pA = prevRow[colAIndex] ? prevRow[colAIndex].toString().trim() : "";
                            if (pB && !pB.toLowerCase().includes("tên học sinh") && !pB.toLowerCase().includes("họ và tên")) {
                                upperInfo = pB;
                                actualClassTitleForSearch = pB; 
                            } else if (pA) {
                                upperInfo = pA;
                                actualClassTitleForSearch = pA;
                            }
                        }
                    }

                    currentClassName = cellB;
                    currentUpperHeader = upperInfo;
                    return;
                }

                if (cellB === "" || cellB_lower === "tên học sinh" || cellB_lower === "tên hs" || cellB_lower === "họ và tên") {
                    return;
                }

                let cleanPhone = cellP.replace(/[^0-9]/g, "");
                if (cleanPhone.length === 9 && !cleanPhone.startsWith("0")) cleanPhone = "0" + cleanPhone;

                if (cleanPhone.length === 10) {
                    cleanPhone = cleanPhone.replace(/(\d{4})(\d{3})(\d{3})/, "$1 $2 $3");
                } else if (cleanPhone.length > 0) {
                    cleanPhone = cleanPhone.replace(/(\d{3})(?=\d)/g, "$1 ");
                }

                if (cellB && !/^\d+$/.test(cellB) && cleanPhone.replace(/\s/g, "").length >= 9 && cleanPhone.replace(/\s/g, "").length <= 11) {
                    if (!currentClassName) {
                        currentClassName = `Chung - Khối ${sheetName}`;
                        actualClassTitleForSearch = `Chung - Khối ${sheetName}`;
                    }
                    // Lưu dưới dạng Object để dễ xử lý render nút bấm
                    currentClassStudents.push({
                        name: cellB,
                        phone: cleanPhone
                    });
                }
            });

            if (currentClassStudents.length > 0) {
                totalStudentsCount += currentClassStudents.length;
                currentSheetBlock.cards.push({
                    upperTitle: currentUpperHeader,
                    className: currentClassName,
                    studentsList: currentClassStudents,
                    realTitle: actualClassTitleForSearch || currentClassName
                });
            }

            if (currentSheetBlock.cards.length > 0) {
                finalStoredData.push(currentSheetBlock);
            }
        }

        currentIdx++;
        setTimeout(parseNext, 20);
    }

    parseNext();
}

// THAY ĐỔI LỚN Ở ĐÂY: Tạo danh sách dòng kèm nút Gọi Điện thay vì Textarea
function renderBlocksFromData(dataBlocks) {
    const mainOutputContainer = document.getElementById('outputContainer');
    mainOutputContainer.innerHTML = ""; 

    dataBlocks.forEach(block => {
        let sheetBlock = document.createElement('div');
        sheetBlock.className = 'sheet-section';
        sheetBlock.innerHTML = `<div class="sheet-title">SHEET: ${block.sheetName}</div>`;
        
        let cardsGrid = document.createElement('div');
        cardsGrid.className = 'cards-grid';
        sheetBlock.appendChild(cardsGrid);

        block.cards.forEach(cardData => {
            let card = document.createElement('div');
            card.className = 'class-card';
            card.setAttribute('data-classname', cardData.realTitle);

            let header = document.createElement('div');
            header.className = 'class-header';
            
            if (cardData.upperTitle) {
                header.innerHTML += `<span class="upper-title">${cardData.upperTitle}</span>`;
            }
            header.innerHTML += `<div class="class-name">[LỚP: ${cardData.className}]</div>`;

            // Khung chứa danh sách học sinh (Cuộn dọc)
            let listContainer = document.createElement('div');
            listContainer.className = 'students-list-box';

            let textForCopy = []; // Phục vụ cho tính năng Copy toàn bộ lớp

            cardData.studentsList.forEach(student => {
                textForCopy.push(`${student.name}\t${student.phone}`);
                let rawPhone = student.phone.replace(/\s/g, "");

                let row = document.createElement('div');
                row.className = 'student-row';
                row.innerHTML = `
                    <div class="student-info">
                        <span class="std-name">${student.name}</span>
                        <span class="std-phone">${student.phone}</span>
                    </div>
                    <a href="tel:${rawPhone}" class="call-btn">📞 Gọi</a>
                `;
                listContainer.appendChild(row);
            });

            let btn = document.createElement('button');
            btn.className = 'copy-btn';
            btn.innerText = '📋 Copy Tên + SĐT Toàn Lớp';
            btn.onclick = function() {
                navigator.clipboard.writeText(textForCopy.join('\n')).then(() => {
                    btn.innerText = '✓ Đã Copy Thành Công!';
                    btn.classList.add('copied');
                    setTimeout(() => {
                        btn.innerText = '📋 Copy Tên + SĐT Toàn Lớp';
                        btn.classList.remove('copied');
                    }, 1500);
                });
            };

            card.appendChild(header);
            card.appendChild(listContainer);
            card.appendChild(btn);
            cardsGrid.appendChild(card);
        });

        mainOutputContainer.appendChild(sheetBlock);
    });
}

function searchStudent() {
    const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
    const resultBox = document.getElementById('searchResultBox');
    const resultBody = document.getElementById('resultBody');
    const resultCount = document.getElementById('resultCount');
    
    resultBody.innerHTML = "";
    resultBox.style.display = 'none';
    const allCards = document.querySelectorAll('.class-card');
    allCards.forEach(card => card.classList.remove('highlighted'));

    if (keyword === "") return;

    let absoluteKeyword = keyword.replace(/\s/g, ""); 
    let firstMatchCard = null;
    let matchCount = 0;

    allCards.forEach(card => {
        const rows = card.querySelectorAll('.student-row');
        const className = card.getAttribute('data-classname') || "Chưa rõ lớp";
        let isCardMatched = false;

        rows.forEach(row => {
            const studentName = row.querySelector('.std-name').innerText;
            const studentPhone = row.querySelector('.std-phone').innerText;
            
            const textToSearch = (studentName + " " + studentPhone).toLowerCase();
            const textNoSpace = textToSearch.replace(/\s/g, "");

            if (textToSearch.includes(keyword) || textNoSpace.includes(absoluteKeyword)) {
                matchCount++;
                isCardMatched = true;

                const rawPhone = studentPhone.replace(/\s/g, "");

                const resultRow = document.createElement('tr');
                resultRow.innerHTML = `
                    <td style="font-weight: bold; color: #fff;">${studentName}</td>
                    <td style="color: #2ecc71; font-family: monospace;">${studentPhone}</td>
                    <td style="color: #ffb142; font-weight: bold;">${className}</td>
                    <td>
                        <a href="tel:${rawPhone}" class="call-btn">📞 Gọi Điện</a>
                    </td>
                `;
                resultBody.appendChild(resultRow);
            }
        });

        if (isCardMatched) {
            card.classList.add('highlighted');
            if (!firstMatchCard) {
                firstMatchCard = card;
            }
        }
    });

    if (matchCount > 0) {
        resultCount.innerText = `Tìm thấy ${matchCount} học viên`;
        resultBox.style.display = 'block';
        
        if (firstMatchCard) {
            firstMatchCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    } else {
        resultCount.innerText = "";
        alert("Không tìm thấy học sinh nào trùng khớp với thông tin đã nhập.");
    }
}

function clearLocalStorage() {
    if (confirm("Bạn có chắc chắn muốn xóa toàn bộ dữ liệu lịch sử đã lưu trên trình duyệt không?")) {
        localStorage.removeItem('excel_processed_data');
        localStorage.removeItem('excel_file_name');
        localStorage.removeItem('excel_student_count');
        
        document.getElementById('fileNameDisplay').innerText = "Chưa chọn tệp nào";
        document.getElementById('statusMessage').innerHTML = "";
        document.getElementById('outputContainer').innerHTML = "";
        document.getElementById('searchResultBox').style.display = 'none';
        document.getElementById('excelFile').value = "";
        document.getElementById('progressContainer').style.display = 'none';
        
        alert("Đã xóa dữ liệu thành công!");
    }
}

function handleSearchKeyPress(event) {
    if (event.key === 'Enter') {
        searchStudent();
    }
}
